name: Sync Release

on:
  repository_dispatch:
    types: [new-release]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        env:
          TAG: ${{ github.event.client_payload.tag }}
          GH_TOKEN: ${{ secrets.FlClash_AND_Publish_PAT }}
        run: |
          mkdir -p ./release
          gh release download "$TAG" --repo go2world-icu/FlClash --dir ./release

      - name: Create Release in FlClash-Publish
        env:
          TAG: ${{ github.event.client_payload.tag }}
          GH_TOKEN: ${{ secrets.FlClash_AND_Publish_PAT }}
        run: |
          gh release create "$TAG" ./release/* \
            --repo go2world-icu/FlClash-Publish \
            --title "$TAG" \
            --notes "Synced from go2world-icu/FlClash $TAG"
